name: Build and Release Windows C++ Project

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build C++ Solution
      # MSBuild natively handles the C++ compilation flags from the .slnx file
      run: msbuild OffGit.slnx /p:Configuration=Release /p:Platform=x64

    - name: Stage Raw Executable
      # Pulls the loose .exe out of the build directory and places it in the root
      run: cp x64/Release/OffGit.exe ./OffGit.exe

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./OffGit.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
