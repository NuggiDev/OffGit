name: Build and Release C++ Project

on:
  push:
    tags:
      - 'v*' # Triggers the workflow only when you push a version tag

permissions:
  contents: write # Crucial permission allowing the runner to create a release

jobs:
  build-and-release:
    runs-on: ubuntu-latest # Change to windows-latest if your project requires MSVC/Windows

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: cmake --build ${{github.workspace}}/build --config Release

    - name: Package Binaries
      run: |
        mkdir staging
        # Replace 'my_executable' with the actual name of your compiled binary file
        cp ${{github.workspace}}/build/my_executable ./staging/
        cd staging
        tar -czvf ../release-assets.tar.gz *

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: release-assets.tar.gz
        generate_release_notes: true # Automatically generates a changelog based on commit history
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Provided automatically by GitHub
