name: Build and Release Windows C++ Project

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.0

permissions:
  contents: write # Grants the action permission to upload artifacts to your release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -A x64

    - name: Build Project
      run: cmake --build build --config Release

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
     
        files: build/Release/OffGit.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
