name: Build and Release Windows C++ Project

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build C++ Solution
      # Wildcard finds the solution file anywhere in the repo
      run: msbuild **/*.slnx /p:Configuration=Release /p:Platform=x64

    - name: Stage Raw Executable
      # Wildcard finds the compiled .exe wherever it landed and copies it flat to the root
      shell: bash
      run: cp **/Release/OffGit.exe ./OffGit.exe

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./OffGit.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
