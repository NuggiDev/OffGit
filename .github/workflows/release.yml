name: Build and Release Windows C++ Project

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    # This forces all steps to use Bash so paths and wildcards work cleanly
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build C++ Solution
      # Hardcoded to your exact path so MSBuild can't miss it
      run: msbuild offgit/OffGit.slnx /p:Configuration=Release /p:Platform=x64

    - name: Stage Raw Executable
      # Bash easily expands the wildcard to find the compiled binary
      run: cp **/Release/OffGit.exe ./OffGit.exe

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./OffGit.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
